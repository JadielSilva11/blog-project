<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <header>
            <img id="bg" src="images/illustration-article.svg" alt="Imagem de fundo">
            <p id="principal" >Learning</p>
            <p>Published 21 Dec 2023</p>
        </header>
        <main>
            <h1>HTML & CSS foundation</h1>
            <p id="text">These languages are the backbone of every website, defining structure, content, and presentation.</p>
            <div id="user">
                <img src="images/image-avatar.webp" alt="Greg Hooper image">
                <p id="name">Greg Hooper</p>
            </div>
        </main>
    </div>

    <footer>
            <p>Challenged by <a target="_blank" href="https://www.frontendmentor.io/challenges/blog-preview-card-ckPaj01IcS">Frontend mentor</a></p>
            <p>Coded by <a target="_blank" href="https://github.com/JadielSilva11">Jadiel Silva</a></p>
    </footer>
</body>
</html>
